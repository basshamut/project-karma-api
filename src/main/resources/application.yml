server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/karma-api}

spring:
  jackson:
    default-property-inclusion: NON_NULL
  web:
    resources:
      add-mappings: true
  banner:
    location: classpath:banner.txt
  
  # Database configuration
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/karma_db?autoReconnect=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
    database-platform: ${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
    show-sql: ${JPA_SHOW_SQL:false}
  
  # H2 Console (solo para desarrollo con H2)
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: ${H2_CONSOLE_PATH:/h2-console}